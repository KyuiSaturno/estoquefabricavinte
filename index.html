<div id="painel-principal" class="escondido">
        <header class="barra-superior">
            <div class="logo-area">
                <span class="logo-texto">JERI 20</span>
            </div>
            <div class="usuario-status">
                <span id="nome-operador">Usuário: Carregando...</span>
            </div>
        </header>

        <nav class="abas-navegacao">
            <button id="btn-aba-inicio" class="btn-aba ativa" onclick="alternarAba('inicio')">Início</button>
            <button id="btn-aba-produtos" class="btn-aba" onclick="alternarAba('produtos')">Catálogo de Produtos</button>
        </nav>

        <main class="conteudo-principal">
            <section class="coluna-conteudo">
                
                <div id="aba-inicio" class="bloco-card">
                    <h2 class="titulo-boas-vindas">Painel de Controle</h2>
                    <div class="caixa-mensagem-boas-vindas">
                        <p id="texto-boas-vindas">Carregando mensagem do dia...</p>
                    </div>
                </div>

                <div id="aba-produtos" class="bloco-card escondido">
                    <h2>Explorar Catálogo por Categoria</h2>
                    <div class="seletor-grupo-filtro">
                        <label for="filtro-categoria">Selecionar Categoria:</label>
                        <select id="filtro-categoria" onchange="filtrarPorCategoria()">
                            <option value="">-- Escolha uma Categoria --</option>
                        </select>
                    </div>
                    
                    <div id="lista-produtos-filtrados" class="grid-produtos">
                        <p class="carrinho-vazio">Selecione uma categoria acima para listar os modelos correspondentes.</p>
                    </div>
                </div>

            </section>

            <section class="coluna-carrinho bloco-card">
                <h2>Transmissão de Saída</h2>
                
                <div class="seletor-grupo">
                    <label for="localizacao">Destino da Mercadoria:</label>
                    <select id="localizacao">
                        <option value="Loja Física Jeri">Loja Física Jeri</option>
                        <option value="Loja Física Jijoca">Loja Física Jijoca</option>
                        <option value="Envio de Pedido">Envio de Pedido</option>
                    </select>
                </div>

                <div class="divisor"></div>

                <h3>Itens Selecionados</h3>
                <div id="itens-carrinho">
                    <p class="carrinho-vazio">Nenhum item selecionado.</p>
                </div>

                <button id="btn-confirmar" class="btn-confirmar-baixa" onclick="confirmarBaixa()" disabled>
                    Confirmar
                </button>
            </section>
        </main>
    </div>
