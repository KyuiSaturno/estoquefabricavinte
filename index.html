<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Jeri 20 - Estoque</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="nav-mobile-sistema" class="bottom-nav escondido">
        <button class="bottom-nav-item ativa" id="btn-nav-produtos" onclick="alternarAbaSistemas('produtos')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
            </svg>
            <span>Catálogo</span>
        </button>
        
        <button class="bottom-nav-item" id="btn-nav-carrinho" onclick="alternarAbaSistemas('carrinho')" style="position: relative;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span>Carrinho</span>
            <span id="badge-contador" class="badge-contador">0</span>
        </button>
        
        <button class="bottom-nav-item" style="color: var(--cor-erro, #ff4d4d);" onclick="window.location.reload()">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <span>Sair</span>
        </button>
    </div>

    <div id="tela-login" class="bloco-card-login">
        <div class="login-header">
            <span class="logo-texto">JERI 20</span>
            <p>Insira suas credenciais para acessar o estoque</p>
        </div>
        
        <div class="seletor-grupo">
            <label for="usuario">Usuário:</label>
            <input type="text" id="usuario" placeholder="Digite seu usuário">
        </div>

        <div class="seletor-grupo">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" placeholder="Digite sua senha">
        </div>

        <p id="erro-login" style="color: var(--cor-erro); font-size: 14px; margin-bottom: 15px; font-weight: 600;"></p>

        <button id="btn-login" class="btn-confirmar-baixa" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="painel-principal" class="escondido">
        <header class="barra-superior">
            <div class="logo-area">
                <span class="logo-texto">JERI 20</span>
            </div>
            <div class="usuario-status">
                <span id="nome-operador">Usuário: Carregando...</span>
            </div>
        </header>

        <nav class="abas-navegacao">
            <button id="btn-aba-produtos" class="btn-aba ativa" onclick="alternarAbaSistemas('produtos')">Catálogo de Produtos</button>
            <button id="btn-aba-carrinho" class="btn-aba" onclick="alternarAbaSistemas('carrinho')">Transmissão de Saída</button>
        </nav>

        <main class="conteudo-principal">
            
            <div id="aba-produtos" class="bloco-card">
                <h2>Explorar Catálogo por Categoria</h2>
                <div class="seletor-grupo-filtro">
                    <label for="filtro-categoria">Selecionar Categoria:</label>
                    <select id="filtro-categoria" onchange="filtrarPorCategoria()">
                        <option value="">-- Escolha uma Categoria --</option>
                    </select>
                </div>

                <div style="margin: -5px 0 20px 0; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="filtro-promocional" onchange="aplicarFiltroVisual()" style="width: 18px; height: 18px; cursor: pointer;">
                    <label for="filtro-promocional" style="font-size: 14px; font-weight: bold; color: var(--cor-principal); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px;">
                        Promocional 🏷️
                    </label>
                </div>
                
                <div id="lista-produtos-filtrados" class="grid-produtos">
                    <p class="carrinho-vazio">Selecione uma categoria acima para listar os modelos correspondentes.</p>
                </div>
            </div>

            <section id="aba-carrinho" class="coluna-carrinho bloco-card">
                <h2>Transmissão de Saída</h2>
                
                <div class="seletor-grupo">
                    <label for="localizacao">Destino da Mercadoria:</label>
                    <select id="localizacao">
                        <option value="Loja Física Jeri">Loja Física Jeri</option>
                        <option value="Loja Física Jijoca">Loja Física Jijoca</option>
                        <option value="Envio de Pedido">Envio de Pedido</option>
                    </select>
                </div>

                <div class="divisor"></div>

                <h3>Itens Selecionados</h3>
                <div id="itens-carrinho">
                    <p class="carrinho-vazio">Nenhum item selecionado.</p>
                </div>

                <button id="btn-confirmar" class="btn-confirmar-baixa" onclick="confirmarBaixa()" disabled>
                    Confirmar
                </button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
