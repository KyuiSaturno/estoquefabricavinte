<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGV - Jeri 20</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="tela-login" class="tela-login-container">
        <div class="card-login">
            <h2>ESTOQUE FABRICA 20</h2>
            <p>Insira suas credenciais para acessar o catálogo</p>
            
            <div class="seletor-grupo">
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" placeholder="Digite seu usuário">
            </div>
            
            <div class="seletor-grupo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="Digite sua senha">
            </div>
            
            <p id="erro-login" class="erro-mensagem" style="color: #ff4d4d; font-weight: bold; margin-bottom: 15px; text-align: center;"></p>
            
            <button id="btn-login" class="btn-adicionar" style="width: 100%; font-size: 16px; padding: 12px;">Entrar</button>
        </div>
    </div>

    <div id="painel-principal" class="escondido">
        
        <header class="barra-superior">
            <div class="logo-texto">JERI 20</div>
            
            <div class="usuario-status-container">
                <span id="nome-operador">Usuário: Carregando...</span>
                
                <button id="btn-carrinho-topo" class="btn-carrinho-topo-pc">
                    🛒 Carrinho
                    <span id="contador-topo" class="badge-contador-topo">0</span>
                </button>
                
                <button id="btn-sair" class="btn-sair-desktop">Sair</button>
            </div>
        </header>

        <main class="conteudo-principal">
            
            <section id="aba-produtos" class="bloco-card exibir-mobile">
                <h2>Explorar Catálogo por Categoria</h2>
                
                <div class="seletor-grupo-filtro">
                    <label for="filtro-categoria">Selecionar Categoria:</label>
                    <select id="filtro-categoria">
                        </select>
                </div>

                <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="filtro-promocional" style="width: auto;">
                    <label for="filtro-promocional" style="margin: 0; color: var(--cor-principal); font-weight: bold; cursor: pointer;">
                        Promocional 🏷️
                    </label>
                </div>

                <div id="grid-produtos" class="grid-produtos">
                    </div>
            </section>

        </main>
    </div>

    <div id="aba-carrinho" class="sidebar-gaveta-carrinho">
        <div class="sidebar-carrinho-header">
            <h2>Carrinho</h2>
            <button id="btn-fechar-carrinho" class="btn-fechar-sidebar">&times;</button>
        </div>
        
        <div class="sidebar-carrinho-corpo">
            <h3>Destino da Mercadoria:</h3>
            <div class="seletor-grupo" style="margin-bottom: 20px;">
                <select id="select-destino">
                    <option value="Loja Física Jeri">Loja Física Jeri</option>
                    <option value="Loja Física Jijoca">Loja Física Jijoca</option>
                    <option value="Venda">Venda</option>
                </select>
            </div>

            <h3>Itens Selecionados</h3>
            <div id="itens-carrinho">
                <p class="carrinho-vazio">Nenhum item selecionado.</p>
            </div>
        </div>

        <div class="sidebar-carrinho-footer">
            <button id="btn-confirmar" class="btn-confirmar-baixa" disabled>Confirmar</button>
        </div>
    </div>

    <div id="overlay-carrinho" class="overlay-escuro"></div>

    <nav id="nav-mobile-sistema" class="bottom-nav escondido">
        <button class="bottom-nav-item ativa" id="btn-nav-produtos">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6-6h4V4h-4v4zm6-4v4h4V4h-4zm-6 6h4v-4h-4v4zm6 0h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
            Catálogo
        </button>
        <button class="bottom-nav-item" id="btn-nav-carrinho">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            Carrinho
            <span id="contador-Abas" class="badge-contador">0</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
